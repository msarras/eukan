  - python>=3.10,<3.13

  # External tools
  - augustus>=3.5
  - codingquarry>=2.0
  - diamond
  - genomethreader>=1.7
  - repeatmasker>=4.1
  - repeatmodeler>=2.0
  - rmblast
  - samtools>=1.20
  - segemehl>=0.3.4
  - snap
  - spades>=4.3
  - spaln>=3.0
  - star>=2.7
  - stringtie>=3.0
  - table2asn>=1.28
  - trf>=4.09
  - trinity>=2.15

  # Build dependencies (needed to compile fitild from source)
  - gsl
  - liblbfgs

  # Perl (needed by AUGUSTUS and GeneMark helper scripts)
  - perl
  - perl-yaml
  - perl-hash-merge
  - perl-mce
  - perl-parallel-forkmanager
  - perl-math-utils

  # eukan + Python dependencies (installed via pip for version consistency)
  - pip
  - pip:
    - .

