# External tool dependencies for eukan.
#
# Single source of truth — consumed by:
#   - eukan check                    (verifies tools are installed)
#   - eukan.infra.environ            (configures conda env vars at runtime)
#   - eukan.infra.tools_registry     (loader shared by the above)
#   - environment.yml                (regenerate with: eukan dev generate-env)
#   - docker/Dockerfile              (ARG versions should match min_version here)
#
# Per-tool fields (all optional unless marked required):
#   binary          = executable name on PATH                           (required)
#   version_cmd     = command to probe the tool (exit 0 or stdout/stderr = success)
#   required_by     = which eukan subcommands need this tool
#   conda_package   = bioconda/conda-forge package name (omit if not available)
#   min_version     = minimum version for conda pin (omit for unpinned)
#   conda_pin       = exact "=version=build" pin; overrides min_version. Used to
#                     hold a tool at an x86-64-v2 build (bioconda's newer builds
#                     target x86-64-v3 and SIGILL on pre-Haswell CPUs)
#   install_hint    = shown by `eukan check` when the tool is missing
#
#   env_vars = [ { var, path?, add_to_path? }, ... ]
#       Environment variables the tool needs. Each entry:
#           var         — env var name (checked by `eukan check`)
#           path        — path relative to $CONDA_PREFIX that sets `var`
#                         under conda. Omit for vars set externally
#                         (e.g., in the Dockerfile).
#           add_to_path — dirs relative to `var`'s value, prepended to PATH
#                         (for scripts bundled inside the tool's install tree).
#
#   conda_path_dirs = dirs relative to $CONDA_PREFIX, prepended to PATH
#   conda_lib_dirs  = dirs relative to $CONDA_PREFIX, prepended to
#                     LD_LIBRARY_PATH in subprocesses only (keeps system
#                     tools like git from breaking in the parent process).

[augustus]
binary = "augustus"
version_cmd = ["augustus", "--version"]
required_by = ["annotate"]
conda_package = "augustus"
min_version = "3.5"
# Pinned to an x86-64-v2 build (also covers bundled etraining): bioconda's
# newer 3.5.0 builds require AVX2 (x86-64-v3) and SIGILL on pre-Haswell CPUs.
conda_pin = "=3.5.0=pl5321heb9362c_5"
env_vars = [{ var = "AUGUSTUS_CONFIG_PATH", path = "config" }]

[snap]
binary = "snap"
version_cmd = ["snap"]
required_by = ["annotate"]
conda_package = "snap"
env_vars = [{ var = "ZOE", path = "share/snap" }]

[codingquarry]
binary = "CodingQuarry"
version_cmd = ["CodingQuarry", "-h"]
required_by = ["annotate"]
conda_package = "codingquarry"
min_version = "2.0"
# QUARRY_PATH is version-specific (opt/codingquarry-X.Y/QuarryFiles);
# set by the Dockerfile ENV, not auto-resolved here.
env_vars = [{ var = "QUARRY_PATH" }]

[genemark]
binary = "gmes_petap.pl"
version_cmd = ["gmes_petap.pl"]
required_by = ["annotate"]
install_hint = "Requires a license from https://topaz.gatech.edu/GeneMark/license_download.cgi"
conda_path_dirs = ["opt/genemark"]

[diamond]
binary = "diamond"
version_cmd = ["diamond", "version"]
required_by = ["assemble", "annotate"]
conda_package = "diamond"

[samtools]
binary = "samtools"
version_cmd = ["samtools", "--version"]
required_by = ["annotate", "assemble"]
conda_package = "samtools"
min_version = "1.20"

[star]
binary = "STAR"
version_cmd = ["STAR", "--version"]
required_by = ["assemble"]
conda_package = "star"
min_version = "2.7"
# Pinned to the last x86-64-v2 build: bioconda's newer 2.7.11b builds
# (h5ca1c30_4+) require AVX2 (x86-64-v3) and SIGILL on pre-Haswell CPUs.
conda_pin = "=2.7.11b=h43eeafb_3"

[stringtie]
binary = "stringtie"
version_cmd = ["stringtie", "--version"]
# DORMANT: Trinity (genome-guided) replaced StringTie in the active pipeline.
# Kept installable (conda_package retained, so it stays in environment.yml) in
# case the unwired stringtie module is re-activated; required_by emptied so
# `eukan check assemble` does not demand it.
required_by = []
conda_package = "stringtie"
min_version = "2.2"
# Pinned to a pre-v3 build: bioconda's 3.0.x builds (h29c0135) require
# AVX2/BMI2/FMA (x86-64-v3) and SIGILL on pre-Haswell CPUs. The 2022
# 2.2.1=h3198e80_0 build is x86-64-v2 and runs the same genome-guided path.
conda_pin = "=2.2.1=h3198e80_0"

[segemehl]
binary = "segemehl.x"
version_cmd = ["segemehl.x", "--help"]
required_by = ["assemble"]
conda_package = "segemehl"
min_version = "0.3.4"

[rnaspades]
binary = "rnaspades.py"
version_cmd = ["rnaspades.py", "--version"]
# DORMANT: Trinity (de novo) replaced rnaSPAdes in the active pipeline. Kept
# installable (conda_package retained, so it stays in environment.yml) in case
# the unwired rnaspades module is re-activated; required_by emptied so
# `eukan check assemble` does not demand it.
required_by = []
# rnaspades.py ships in the bioconda 'spades' package.
conda_package = "spades"
min_version = "4.2"
# Pinned to the last x86-64-v2 build: bioconda's 4.2.0 h8d6e82b rebuilds and
# the 4.3.0 build require AVX2 (x86-64-v3) and SIGILL (spades-core, signal 4)
# on pre-Haswell CPUs. 4.2.0=haf24da9_0 is the last x86-64-v2 build.
conda_pin = "=4.2.0=haf24da9_0"

[trinity]
binary = "Trinity"
version_cmd = ["Trinity", "--version"]
required_by = ["assemble"]
conda_package = "trinity"
min_version = "2.15"
# Pinned to the last x86-64-v2 build: bioconda's newer 2.15.2 builds (h077b44d)
# are compiled -march=x86-64-v3 and emit BMI2 (sarx/shrx), which SIGILL on
# pre-Haswell CPUs (e.g. Xeon E5-2690 v2). The _0 build is x86-64-v2 and runs
# the same genome-guided + de-novo paths.
conda_pin = "=2.15.2=pl5321hdcf5f25_0"
# TRINITY_HOME is version-specific; set by the Dockerfile ENV.
env_vars = [{ var = "TRINITY_HOME" }]

[jellyfish]
binary = "jellyfish"
version_cmd = ["jellyfish", "--version"]
required_by = ["assemble"]
# jellyfish is a Trinity dependency — Trinity's conda package pulls it in.
# Don't pin a conda_package here to avoid conflicts with the unrelated
# Python 'jellyfish' package on defaults channel.

[spaln]
binary = "spaln"
version_cmd = ["spaln", "-h"]
required_by = ["annotate"]
conda_package = "spaln"
min_version = "3.0"
# Pinned to the last x86-64-v2 build: bioconda's newer spaln builds
# (3.0.6b+, h077b44d/hf426362) require AVX2 (x86-64-v3) and SIGILL on
# pre-Haswell CPUs.
conda_pin = "=3.0.6=pl5321hdcf5f25_0"
env_vars = [
    { var = "ALN_TAB", path = "share/spaln/table" },
    { var = "ALN_DBS", path = "share/spaln/seqdb" },
    { var = "PERL5LIB", path = "share/spaln/alndbs" },
]

[makdbs]
binary = "makdbs"
version_cmd = ["makdbs", "-h"]
required_by = ["annotate"]
# installed by spaln package

[fitild]
binary = "fitild"
version_cmd = ["fitild"]
required_by = ["annotate"]
install_hint = "Build from source: git clone https://github.com/ogotoh/fitild && cd fitild/src && ./configure && make"
conda_path_dirs = ["opt/fitild/src"]
conda_lib_dirs = ["lib"]

[combinr]
binary = "combinr"
version_cmd = ["combinr", "--version"]
required_by = ["assemble", "annotate"]
# Rust tool, not on conda. The Docker image installs the pinned pre-built
# release binary, and scripts/install-extras.sh fetches the same binary for a
# local conda env. To install by hand, download the archive for your platform
# from https://github.com/BFL-lab/combinr/releases (v0.1.1), extract `combinr`,
# and put it on PATH (or set the combinr_path config /
# EUKAN_ASSEMBLE_COMBINR_PATH). Consolidates transcript-to-genome BAMs into
# non-redundant models (assemble) and builds weighted consensus gene models
# (annotate).
install_hint = "Download the combinr v0.1.1 release binary from https://github.com/BFL-lab/combinr/releases and put it on PATH (or run scripts/install-extras.sh, or set EUKAN_ASSEMBLE_COMBINR_PATH)."

[genomethreader]
binary = "gth"
version_cmd = ["gth", "-version"]
required_by = ["annotate"]
conda_package = "genomethreader"
min_version = "1.7"

[trf]
binary = "trf"
version_cmd = ["trf", "-v"]
required_by = ["annotate", "mask-repeats"]
conda_package = "trf"
min_version = "4.09"

[repeatmodeler]
binary = "RepeatModeler"
version_cmd = ["RepeatModeler", "-version"]
required_by = ["mask-repeats"]
conda_package = "repeatmodeler"
min_version = "2.0"

[builddatabase]
binary = "BuildDatabase"
version_cmd = ["BuildDatabase"]
required_by = ["mask-repeats"]
# bundled with RepeatModeler

[repeatmasker]
binary = "RepeatMasker"
version_cmd = ["RepeatMasker", "-v"]
required_by = ["mask-repeats"]
conda_package = "repeatmasker"
min_version = "4.1"

[rmblast]
binary = "rmblastn"
version_cmd = ["rmblastn", "-version"]
required_by = ["mask-repeats"]
conda_package = "rmblast"

[gff2gbSmallDNA]
binary = "gff2gbSmallDNA.pl"
version_cmd = ["gff2gbSmallDNA.pl"]
required_by = ["annotate"]
# bundled with AUGUSTUS

[optimize_augustus]
binary = "optimize_augustus.pl"
version_cmd = ["optimize_augustus.pl"]
required_by = ["annotate"]
# bundled with AUGUSTUS

[bam2wig]
binary = "bam2wig"
version_cmd = ["bam2wig"]
required_by = ["assemble"]
# bundled with AUGUSTUS

# ---------------------------------------------------------------------------
# Helper binaries bundled with parent packages.
# Registered so `eukan check` can verify their presence.
# ---------------------------------------------------------------------------

[etraining]
binary = "etraining"
version_cmd = ["etraining"]
required_by = ["annotate"]
# bundled with AUGUSTUS

[new_species]
binary = "new_species.pl"
version_cmd = ["new_species.pl"]
required_by = ["annotate"]
# bundled with AUGUSTUS

[randomSplit]
binary = "randomSplit.pl"
version_cmd = ["randomSplit.pl"]
required_by = ["annotate"]
# bundled with AUGUSTUS

[splitMfasta]
binary = "splitMfasta.pl"
version_cmd = ["splitMfasta.pl"]
required_by = ["annotate"]
# bundled with AUGUSTUS

[join_aug_pred]
binary = "join_aug_pred.pl"
# Reads from stdin with no help flag; --help triggers a Getopt error
# that prints "Unknown option: help" — enough to confirm the script runs.
version_cmd = ["join_aug_pred.pl", "--help"]
required_by = ["annotate"]
# bundled with AUGUSTUS

[gtf2gff]
binary = "gtf2gff.pl"
version_cmd = ["gtf2gff.pl"]
required_by = ["annotate"]
# bundled with AUGUSTUS

[wig2hints]
binary = "wig2hints.pl"
# Reads from stdin; --help triggers a Getopt error that prints
# "Unknown option: help" — enough to confirm the script runs.
version_cmd = ["wig2hints.pl", "--help"]
required_by = ["assemble"]
# bundled with AUGUSTUS

[fathom]
binary = "fathom"
version_cmd = ["fathom"]
required_by = ["annotate"]
# bundled with SNAP

[forge]
binary = "forge"
version_cmd = ["forge"]
required_by = ["annotate"]
# bundled with SNAP

[hmm-assembler]
binary = "hmm-assembler.pl"
version_cmd = ["hmm-assembler.pl"]
required_by = ["annotate"]
# bundled with SNAP

[sortgrcd]
binary = "sortgrcd"
version_cmd = ["sortgrcd"]
required_by = ["annotate"]
# bundled with spaln

[makblk]
binary = "makblk.pl"
version_cmd = ["makblk.pl"]
required_by = ["annotate"]
# bundled with spaln

[gthconsensus]
binary = "gthconsensus"
version_cmd = ["gthconsensus", "-version"]
required_by = ["annotate"]
# bundled with GenomeThreader

[table2asn]
binary = "table2asn"
version_cmd = ["table2asn", "-version"]
required_by = ["prep-submission"]
conda_package = "table2asn"
min_version = "1.28"
