version_cmd = ["recombine_EVM_partial_outputs.pl"]
required_by = ["annotate"]
# bundled with EVidenceModeler

[convert_EVM_outputs_to_GFF3]
binary = "convert_EVM_outputs_to_GFF3.pl"
version_cmd = ["convert_EVM_outputs_to_GFF3.pl"]
required_by = ["annotate"]
# bundled with EVidenceModeler

[load_current_gene_annotations]
